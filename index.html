<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans pb-24">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <h1 class="text-xl font-bold text-gray-800 text-center" id="display-restaurant">Loading Menu...</h1>
        <p class="text-sm text-gray-500 text-center">Table: <span id="display-table" class="font-semibold text-gray-800">-</span></p>
    </header>

    <main class="p-4 max-w-md mx-auto" id="menu-container">
        </main>

    <div class="fixed bottom-0 w-full bg-white border-t border-gray-200 p-4 shadow-lg max-w-md mx-auto left-0 right-0">
        <div class="flex justify-between items-center mb-2">
            <span class="font-bold text-gray-700">Total: <span id="cart-total">₹0</span></span>
            <span class="text-sm text-gray-500" id="cart-items-count">0 items</span>
        </div>
        <button onclick="sendOrder()" id="order-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition disabled:bg-gray-400">
            Place Order
        </button>
        <p id="status-msg" class="text-center text-sm font-bold mt-2 hidden"></p>
    </div>

    <script>
      
      // 1. SABHI RESTAURANTS KI LIST (Yahan add karte jao)
// 1. SABHI RESTAURANTS KI LIST
const restaurantScripts = {
    "R1": "https://script.google.com/macros/s/AKfycbxr34JtNFeVV0Qt2K6r3TZB5rk0fOpFkTr-kuBdGHu5dAmkLjjHPTd0J0hGaCj3OSgO/exec"
    // Abhi sirf R1 rakho testing ke liye
};

// 2. URL se Details nikalna
const urlParams = new URLSearchParams(window.location.search);
const resParam = urlParams.get('res') || "R1"; 
const tableId = urlParams.get('table') || "Unknown";

// 3. Sahi Script aur ID set karna
// Agar URL wala resParam list mein nahi hai, toh default R1 uthao
const SCRIPT_URL = restaurantScripts[resParam] || restaurantScripts["R1"];

// Display logic (Isse loading hat jayegi)
document.getElementById('display-restaurant').innerText = "Restaurant: " + resParam;
document.getElementById('display-table').innerText = tableId;

        // 2. Menu Items (Aap baad mein inhe badal sakte hain)
       // 2. Menu Items (Ab seedha Google Sheet se aayenge)
let menuItems = [];

let cart = {}; // Cart object ko wapas yahan set kar diya hai

async function loadMenuFromSheet() {
    let url = SCRIPT_URL + "?action=getMenu&res=" + resParam;
    try {
        let response = await fetch(url);
        let rawData = await response.json();
        
        // Image bhi utha rahe hain backend se
        menuItems = rawData.map((item, index) => {
            return { id: index + 1, name: item.name, price: item.price, image: item.image };
        });
        
        renderMenu(); 
    } catch(error) {
        console.log("Error:", error);
        document.getElementById('menu-container').innerHTML = "<p class='text-center mt-10 text-red-500 font-bold'>Menu load nahi ho paya.</p>";
    }
}

function renderMenu() {
    const container = document.getElementById('menu-container');
    container.innerHTML = '';
    
    menuItems.forEach(item => {
        const qty = cart[item.id] ? cart[item.id].qty : 0;
        
        // Agar sheet me photo nahi hai, toh ek default khane ki photo dikhegi
        const defaultImg = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300&h=300&fit=crop";
        const imgUrl = item.image ? item.image : defaultImg;

        container.innerHTML += `
        <div class="bg-white p-3 rounded-2xl shadow-md mb-4 flex items-center gap-4 border border-gray-100">
            <div class="w-24 h-24 flex-shrink-0">
                <img src="${imgUrl}" class="w-full h-full object-cover rounded-xl shadow-sm" alt="${item.name}">
            </div>
            
            <div class="flex-grow">
                <h3 class="font-bold text-gray-800 text-lg leading-tight">${item.name}</h3>
                <p class="text-blue-600 font-bold mt-1">₹${item.price}</p>
            </div>
            
            <div class="flex flex-col items-center gap-1 flex-shrink-0">
                <div class="flex items-center gap-2 bg-gray-50 p-1 rounded-lg border border-gray-200">
                    <button onclick="updateCart(${item.id}, -1)" class="w-8 h-8 bg-white rounded-md font-bold text-gray-600 shadow-sm">-</button>
                    <span class="font-bold w-4 text-center text-sm">${qty}</span>
                    <button onclick="updateCart(${item.id}, 1)" class="w-8 h-8 bg-blue-500 rounded-md font-bold text-white shadow-sm">+</button>
                </div>
            </div>
        </div>`;
    });
    updateCartUI();
}

loadMenuFromSheet(); // Page khulte hi run karega
     
l
        // 4. Cart Logic (+ / - button dabane par)
        function updateCart(itemId, change) {
            const item = menuItems.find(i => i.id === itemId);
            if (!cart[itemId]) {
                cart[itemId] = { name: item.name, price: item.price, qty: 0 };
            }
            
            cart[itemId].qty += change;
            
            if (cart[itemId].qty <= 0) {
                delete cart[itemId];
            }
            renderMenu();
        }

        function updateCartUI() {
            let totalAmt = 0;
            let totalQty = 0;
            for (let id in cart) {
                totalAmt += cart[id].price * cart[id].qty;
                totalQty += cart[id].qty;
            }
            document.getElementById('cart-total').innerText = "₹" + totalAmt;
            document.getElementById('cart-items-count').innerText = totalQty + " items";
            document.getElementById('order-btn').disabled = totalQty === 0;
        }

       
          function sendOrder() {
    const btn = document.getElementById('order-btn');
    const statusMsg = document.getElementById('status-msg');

    let finalDishNames = [];
    let finalTotalQty = 0;
    let finalTotalPrice = 0;

    for (let id in cart) {
        finalDishNames.push(`${cart[id].name} (x${cart[id].qty})`);
        finalTotalQty += cart[id].qty;
        finalTotalPrice += (cart[id].price * cart[id].qty);
    }

    if (finalTotalQty === 0) {
        alert("Bhai, pehle kuch select toh karo!");
        return;
    }

    // YAHAN DHAYAN DO: Data format ekdum sahi hona chahiye
    const orderData = new URLSearchParams();
    orderData.append('restaurantId', resParam);
    orderData.append('dishName', finalDishNames.join(", "));
    orderData.append('qtySold', finalTotalQty);
    orderData.append('totalPrice', finalTotalPrice);
    orderData.append('tableNo', tableId);

    btn.innerText = "Processing...";
    btn.disabled = true;
    statusMsg.classList.remove('hidden');
    statusMsg.innerText = "Sending order to kitchen...";

    // FETCH COMMAND
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
        },
        body: orderData.toString()
    })
    .then(() => {
        statusMsg.innerText = "Order Placed Successfully!";
        statusMsg.style.color = "green";
        btn.innerText = "Order Sent";
        cart = {}; // Cart khali karo
        renderMenu(); // Menu refresh karo
    })
    .catch(error => {
        console.error('Error:', error);
        statusMsg.innerText = "Error! Try again.";
        statusMsg.style.color = "red";
        btn.disabled = false;
        btn.innerText = "Place Order";
    });
}
          
        // Page load hote hi menu dikhana
        renderMenu();
    </script>
</body>
</html>
