<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entaurent - Smart Restaurant OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 selection:bg-indigo-200 relative">

    <div id="login-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-70 z-50 flex items-center justify-center backdrop-blur-sm transition-all px-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden p-8 relative">
            <button onclick="toggleLogin()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 font-bold text-3xl">&times;</button>
            <h3 class="text-2xl font-black text-indigo-900 mb-6 text-center">Entaurant Login 🔐</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Restaurant ID</label>
                    <input type="text" id="login-id" placeholder="e.g., R1" class="w-full mt-1 px-4 py-3 border-2 border-gray-200 rounded-xl font-bold focus:border-indigo-600 outline-none uppercase transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider">Passcode</label>
                    <input type="password" id="login-pass" placeholder="••••" class="w-full mt-1 px-4 py-3 border-2 border-gray-200 rounded-xl font-bold focus:border-indigo-600 outline-none transition">
                </div>
                <button onclick="verifyLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-[0_5px_15px_rgba(79,70,229,0.4)] transition mt-4 text-lg" id="login-btn">
                    ENTER DASHBOARD 🚀
                </button>
                <p id="login-error" class="text-red-500 text-sm font-bold text-center hidden mt-2 bg-red-50 py-2 rounded-lg border border-red-100">Wrong ID or Passcode! ❌</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWzheI6kH3Ly_l56c9Kfx0yczbF7hbEtTy24IXxzzfZA6XjVQikGKRAqNyII8PvSXa/exec"; 

        function toggleLogin() {
            document.getElementById('login-modal').classList.toggle('hidden');
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('login-id').value = "";
            document.getElementById('login-pass').value = "";
        }

        // 🔥 THE ULTIMATE JSONP LOGIN (No CORS Error, Full Security) 🔥
        function verifyLogin() {
            let id = document.getElementById('login-id').value.trim().toUpperCase();
            let pass = document.getElementById('login-pass').value.trim();
            let btn = document.getElementById('login-btn');
            let errorMsg = document.getElementById('login-error');

            if (!id || !pass) {
                errorMsg.innerText = "Please fill all fields! ❌";
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.innerText = "Checking Code... ⏳";
            errorMsg.classList.add('hidden');

            // 1. Ek invisible SCRIPT tag banate hain (ye CORS bypass karta hai)
            let script = document.createElement('script');
            
            // 2. Google Script se bolte hain ki data JSONP format mein bhej aur ye function chala
            let targetUrl = `${SCRIPT_URL}?action=login&res=${encodeURIComponent(id)}&pass=${encodeURIComponent(pass)}&callback=handleLoginResponse`;
            script.src = targetUrl;
            
            // 3. Error handling agar net nahi hai
            script.onerror = function() {
                errorMsg.innerText = "Network Error! Check Internet ❌";
                errorMsg.classList.remove('hidden');
                btn.innerText = "ENTER DASHBOARD 🚀";
                document.body.removeChild(script); // script hatao
            };

            // 4. Script tag ko body mein daalo taaki request jaye
            document.body.appendChild(script);
        }

        // 5. Ye function Google Script automatic call karega jab response aayega
        function handleLoginResponse(response) {
            let id = document.getElementById('login-id').value.trim().toUpperCase();
            let btn = document.getElementById('login-btn');
            let errorMsg = document.getElementById('login-error');

            // Jo invisible script tag banaya tha, uska kaam khatam, usko uda do
            let scripts = document.querySelectorAll('script[src*="action=login"]');
            scripts.forEach(s => s.remove());

            if (response.status === "SUCCESS") {
                btn.innerText = "Entering... 🚀";
                window.location.href = `dashboard.html?res=${id}`;
            } else {
                errorMsg.innerText = "Wrong ID or Passcode! ❌";
                errorMsg.classList.remove('hidden');
                btn.innerText = "ENTER DASHBOARD 🚀";
            }
        }
    </script>
</body>
</html>
