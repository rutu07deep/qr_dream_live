<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Menu - Entaurent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 pb-28">

    <div id="premium-loader" class="fixed inset-0 bg-slate-50 z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="text-7xl animate-bounce mb-6">👨‍🍳</div>
        <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-6 shadow-lg"></div>
        <h2 class="text-3xl font-black text-slate-800 tracking-tight text-center px-4">Warming up the ovens...</h2>
        <p class="text-slate-500 font-bold mt-3 animate-pulse text-lg">Fetching the freshest menu 🍕</p>
    </div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-indigo-600 tracking-tight" id="res-title">Entaurent</h1>
                <p class="text-sm font-bold text-slate-500" id="table-display">Table --</p>
            </div>
            <div class="bg-indigo-50 px-3 py-1 rounded-lg border border-indigo-100 shadow-sm">
                <span class="text-indigo-800 font-bold text-sm flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-6">
        <div id="menu-container" class="space-y-4">
            </div>
    </main>

    <div id="sticky-bottom-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-40 p-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider" id="bottom-items-count">0 Items</p>
                <p class="text-xl font-black text-slate-900">₹<span id="bottom-total-price">0</span></p>
            </div>
            <button onclick="toggleCart()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black shadow-lg hover:bg-indigo-700 transition transform hover:scale-105 flex items-center gap-2">
                VIEW CART 🛒
            </button>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-70 z-50 flex items-end sm:items-center justify-center backdrop-blur-sm transition-all">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            
            <div class="px-6 py-5 border-b flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-black text-slate-800">Your Order 🛒</h3>
                <button onclick="toggleCart()" class="text-slate-400 hover:text-red-500 font-black text-3xl">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1">
                <div id="cart-items" class="space-y-3 mb-6">
                    <p class="text-center text-slate-400 text-sm font-bold">Cart is empty.</p>
                </div>
                
                <div class="border-t border-slate-200 pt-4 flex justify-between items-center bg-white">
                    <span class="text-sm font-bold text-slate-500">Total Amount:</span>
                    <span class="text-3xl font-black text-slate-900">₹<span id="cart-total">0</span></span>
                </div>

                <div id="upi-section" class="hidden mt-6 bg-slate-50 p-5 rounded-2xl border border-indigo-100 text-center shadow-inner">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Pay via UPI</p>
                    
                    <div class="bg-white p-3 rounded-xl inline-block shadow-md border border-slate-200 mb-2">
                        <img id="upi-qr-image" src="" alt="UPI QR" class="w-32 h-32 mx-auto">
                    </div>
                    <p class="text-sm font-bold text-slate-600">Scan QR - OR -</p>
                    
                    <a id="upi-link-btn" href="#" class="mt-3 w-full block bg-white border-2 border-indigo-600 text-indigo-700 hover:bg-indigo-50 font-black py-3 rounded-xl shadow-sm transition">
                        ⚡ TAP TO PAY (GPay/PhonePe)
                    </a>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-slate-200 shadow-[0_-5px_10px_-5px_rgba(0,0,0,0.1)]">
                <button id="place-order-btn" onclick="placeOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl shadow-[0_5px_15px_rgba(22,163,74,0.4)] transition text-xl tracking-wide disabled:opacity-50 disabled:cursor-not-allowed">
                    PLACE ORDER 🚀
                </button>
            </div>

        </div> 
    </div> 

    <script>
        // 🔥 BACK BUTTON FIX
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) window.location.reload();
        });

        // 🚨 APNA SCRIPT URL YAHAN DAALNA 👇
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWzheI6kH3Ly_l56c9Kfx0yczbF7hbEtTy24IXxzzfZA6XjVQikGKRAqNyII8PvSXa/exec"; 

        const urlParams = new URLSearchParams(window.location.search);
        const resId = urlParams.get('res') || "R1";
        const tableNo = urlParams.get('table') || "Takeaway";
        
        document.getElementById("table-display").innerText = "Table " + tableNo;

        let menuData = [];
        let cart = {};
        let clientUpiId = "";
        let clientResName = "Restaurant " + resId;

        // 🔥 NINJA FETCH ENGINE (Bypasses CORS & Cache)
        async function safeFetch(action, extraParams = "") {
            const noCacheUrl = `${SCRIPT_URL}?action=${action}&res=${resId}${extraParams}&t=${new Date().getTime()}`;
            return await fetch(noCacheUrl, { redirect: "follow" });
        }

        // Hides the premium loader smoothly
        function hideLoader() {
            const loader = document.getElementById('premium-loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }

        async function fetchMenuAndSettings() {
            // 🔥 INSTANT LOAD TRICK: Check agar phone me pehle se menu save hai
            const cachedMenu = localStorage.getItem("entaurent_menu_" + resId);
            const cachedName = localStorage.getItem("entaurent_name_" + resId);
            const cachedUpi = localStorage.getItem("entaurent_upi_" + resId);

            if (cachedMenu && cachedName) {
                // Agar save hai toh turant (0.1 sec me) dikha do!
                menuData = JSON.parse(cachedMenu);
                clientResName = cachedName;
                clientUpiId = cachedUpi || "";
                document.getElementById("res-title").innerText = clientResName;
                renderMenu();
                hideLoader(); 
            }

            try {
                // Background me chup-chaap naya data check karo
                const setRes = await safeFetch("getSettings");
                const setData = await setRes.json();
                clientResName = setData.name || "Restaurant " + resId;
                clientUpiId = setData.upi || "";
                
                document.getElementById("res-title").innerText = clientResName;
                localStorage.setItem("entaurent_name_" + resId, clientResName);
                localStorage.setItem("entaurent_upi_" + resId, clientUpiId);

                const menuRes = await safeFetch("getMenu");
                menuData = await menuRes.json();
                
                // Naya menu save kar lo aur screen update kar do
                localStorage.setItem("entaurent_menu_" + resId, JSON.stringify(menuData));
                renderMenu();
                
                // Agar pehli baar load ho raha hai, toh loader hatao
                if (!cachedMenu) hideLoader();

            } catch (error) {
                if (!cachedMenu) {
                    document.getElementById('premium-loader').innerHTML = "<h2 class='text-2xl font-black text-red-500'>Connection Error! ❌</h2><p class='text-slate-500 mt-2'>Please check your internet.</p>";
                }
            }
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            
            if(menuData.length === 0) {
                container.innerHTML = "<p class='text-center text-slate-400 mt-5 font-bold'>No items available today.</p>";
                return;
            }

            let html = "";
            menuData.forEach(item => {
                let isAvail = item.status === "Available";
                let btnHtml = isAvail 
                    ? `<button onclick="addToCart('${item.name}', ${item.price})" class="bg-indigo-50 text-indigo-700 border border-indigo-200 px-5 py-2 rounded-xl text-sm font-black hover:bg-indigo-100 active:scale-95 transition shadow-sm">+ ADD</button>`
                    : `<span class="bg-slate-100 text-slate-400 px-4 py-2 rounded-xl text-[10px] font-black tracking-widest border border-slate-200 uppercase">Sold Out</span>`;

                let defaultImg = 'https://cdn-icons-png.flaticon.com/512/3170/3170733.png';
                let imgSrc = item.image ? item.image : defaultImg;

                html += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex gap-4 items-center transform hover:-translate-y-1 transition-all duration-300">
                    <img src="${imgSrc}" alt="${item.name}" class="w-20 h-20 object-cover rounded-xl border border-slate-100 shadow-sm ${!isAvail ? 'opacity-50 grayscale' : ''}">
                    
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800 text-lg leading-tight ${!isAvail ? 'opacity-50 line-through' : ''}">${item.name}</h3>
                        <p class="font-black text-indigo-600 mt-1 text-lg">₹${item.price}</p>
                    </div>
                    <div>${btnHtml}</div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function addToCart(name, price) {
            if(cart[name]) cart[name].qty++;
            else cart[name] = { price: price, qty: 1 };
            updateCartUI();
        }

        function updateCartUI() {
            let cartHtml = "";
            let total = 0;
            let totalItems = 0;

            for(let key in cart) {
                let itemTotal = cart[key].qty * cart[key].price;
                total += itemTotal;
                totalItems += cart[key].qty;
                cartHtml += `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div class="flex-1">
                        <p class="font-bold text-slate-800 text-base">${key}</p>
                        <p class="text-sm font-black text-indigo-500">₹${cart[key].price} x ${cart[key].qty}</p>
                    </div>
                    <div class="font-black text-slate-800 text-lg">₹${itemTotal}</div>
                </div>`;
            }

            if(totalItems === 0) {
                document.getElementById('cart-items').innerHTML = '<p class="text-center text-slate-400 font-bold">Cart is empty.</p>';
                document.getElementById('place-order-btn').disabled = true;
                document.getElementById('upi-section').classList.add('hidden'); 
                document.getElementById('sticky-bottom-bar').classList.add('hidden');
            } else {
                document.getElementById('cart-items').innerHTML = cartHtml;
                document.getElementById('place-order-btn').disabled = false;
                
                document.getElementById('sticky-bottom-bar').classList.remove('hidden');
                document.getElementById('bottom-items-count').innerText = totalItems + (totalItems > 1 ? " Items" : " Item");
                document.getElementById('bottom-total-price').innerText = total;

                if(clientUpiId && clientUpiId.trim() !== "") {
                    document.getElementById('upi-section').classList.remove('hidden');
                    let upiLink = `upi://pay?pa=${clientUpiId}&pn=${encodeURIComponent(clientResName)}&am=${total}&cu=INR`;
                    document.getElementById('upi-qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(upiLink)}`;
                    document.getElementById('upi-link-btn').href = upiLink;
                } else {
                    document.getElementById('upi-section').classList.add('hidden');
                }
            }
            document.getElementById('cart-total').innerText = total;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
        }

        async function placeOrder() {
            let btn = document.getElementById('place-order-btn');
            btn.innerText = "Sending Order... ⏳";
            btn.disabled = true;

            let itemsArr = [];
            let totalAmt = 0;
            for(let key in cart) {
                itemsArr.push(`${key} (x${cart[key].qty})`);
                totalAmt += (cart[key].qty * cart[key].price);
            }
            let itemsStr = itemsArr.join(", ");

            try {
                await safeFetch("placeOrder", `&table=${tableNo}&items=${encodeURIComponent(itemsStr)}&amount=${totalAmt}`);
                
                alert(`🎉 Order Placed Successfully! (Total: ₹${totalAmt})`);
                cart = {};
                updateCartUI();
                toggleCart();
                btn.innerText = "PLACE ORDER 🚀";
            } catch(e) {
                alert("Error! Please try again. Internet check karein.");
                btn.innerText = "PLACE ORDER 🚀";
                btn.disabled = false;
            }
        }

        window.onload = fetchMenuAndSettings;
    </script>
</body>
</html>
