<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display - SaaS</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans p-6">
    <div class="flex flex-col md:flex-row justify-between items-center border-b border-gray-700 pb-4 mb-6 gap-4">
        <h1 class="text-3xl font-black text-yellow-500">KITCHEN DASHBOARD</h1>
        <div class="flex items-center gap-4">
            <button onclick="enableSound()" id="sound-btn" class="bg-gray-800 text-xs font-bold px-3 py-1 rounded border border-gray-600 hover:bg-gray-700">🔊 Enable Sound Alert</button>
            <div id="status" class="text-green-500 font-bold animate-pulse">● Live Connection</div>
        </div>
    </div>

    <div id="order-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="text-gray-500 text-center col-span-full mt-10">Waiting for orders... ⏳</p>
    </div>

    <audio id="order-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // 🔥 BACK BUTTON FIX
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) window.location.reload();
        });

        // 🚨 TERA SCRIPT URL
        const SCRIPT_URL ="https://script.google.com/macros/s/AKfycbzWzheI6kH3Ly_l56c9Kfx0yczbF7hbEtTy24IXxzzfZA6XjVQikGKRAqNyII8PvSXa/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const resId = urlParams.get('res') || "R1";

        let lastOrderCount = 0;
        let soundEnabled = false;

        function enableSound() {
            soundEnabled = true;
            document.getElementById('sound-btn').innerText = "🔊 Sound ON";
            document.getElementById('sound-btn').classList.replace('bg-gray-800', 'bg-green-800');
            // Ek baar play karke pause kar do taaki browser permission de de
            let audio = document.getElementById('order-sound');
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e=>console.log(e));
        }
 
        // 🔥 NINJA FETCH ENGINE (CORS Bypass & 100% Fresh Data)
        async function safeFetch(action, extraParams = "") {
            const noCacheUrl = `${SCRIPT_URL}?action=${action}&res=${resId}${extraParams}&t=${new Date().getTime()}`;
            return await fetch(noCacheUrl, { redirect: "follow" });
        }

        async function refreshOrders() { 
            try {
                const res = await safeFetch("getOrders");
                const orders = await res.json();
                
                const container = document.getElementById('order-container');

                if (orders.length > lastOrderCount) {
                    if(soundEnabled) {
                        let audio = document.getElementById('order-sound');
                        audio.play().catch(e => console.log("Sound block ho gaya"));
                    }
                    lastOrderCount = orders.length;
                } else if (orders.length < lastOrderCount) {
                    lastOrderCount = orders.length; 
                }

                if (orders.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center col-span-full mt-10 text-xl font-bold">No pending orders. Kitchen is clear! 🧹</p>';
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="bg-gray-900 border-2 border-yellow-600 rounded-xl p-5 shadow-2xl transform transition hover:scale-105">
                        <div class="flex justify-between border-b border-gray-700 pb-2 mb-3">
                            <span class="text-2xl font-bold text-white">TABLE: ${order.table}</span>
                            <span class="text-gray-400 font-bold text-sm">${order.time}</span>
                        </div>
                        <p class="text-xl text-yellow-100 mb-5 font-bold tracking-wide">${order.items}</p>
                        <button onclick="completeOrder('${order.rowId}', this)" class="w-full bg-green-600 py-3 rounded-lg font-black text-lg hover:bg-green-700 transition shadow-lg">MARK READY ✅</button>
                    </div>
                `).join('');
            } catch (e) { 
                console.error("Error loading orders:", e); 
                document.getElementById('status').innerText = "🔴 Disconnected";
                document.getElementById('status').classList.replace("text-green-500", "text-red-500");
                setTimeout(() => {
                    document.getElementById('status').innerText = "● Live Connection";
                    document.getElementById('status').classList.replace("text-red-500", "text-green-500");
                }, 3000);
            }
        }

        async function completeOrder(rowNumber, btnElement) {
            btnElement.innerText = "UPDATING... ⏳";
            btnElement.disabled = true;
            btnElement.classList.add("opacity-50");

            try {
                await safeFetch("markReady", `&row=${encodeURIComponent(rowNumber)}`);
                refreshOrders(); // Screen ko turant refresh karo
            } catch (error) {
                alert("Network Error! Please try again.");
                btnElement.innerText = "MARK READY ✅";
                btnElement.disabled = false;
                btnElement.classList.remove("opacity-50");
            }
        }
        
        setInterval(refreshOrders, 5000); 
        refreshOrders(); 
    </script>
</body>
</html>
