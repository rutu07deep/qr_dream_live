<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display - SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans p-6">
    <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-6">
        <h1 class="text-3xl font-black text-yellow-500">KITCHEN DASHBOARD</h1>
        <div id="status" class="text-green-500">● Live Connection</div>
    </div>

    <div id="order-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p class="text-gray-500 text-center col-span-full mt-10">Waiting for orders... ⏳</p>
    </div>

    <audio id="order-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // Tera ekdum sahi SCRIPT_URL
        const SCRIPT_URL ="https://script.google.com/macros/s/AKfycbzWzheI6kH3Ly_l56c9Kfx0yczbF7hbEtTy24IXxzzfZA6XjVQikGKRAqNyII8PvSXa/exec";
        
        // NAYA: URL se dukaan ka naam pakadne wala code
        const urlParams = new URLSearchParams(window.location.search);
        const resId = urlParams.get('res') || "R1";

        let lastOrderCount = 0;
 
        async function refreshOrders() { 
            try {
                // NAYA: Backend ko resId bhejna zaroori hai
                const res = await fetch(SCRIPT_URL + "?action=getOrders&res=" + resId);
                const orders = await res.json();
                
                const container = document.getElementById('order-container');

                if (orders.length > lastOrderCount) {
                    let audio = document.getElementById('order-sound');
                    audio.play().catch(e => console.log("Sound ke liye screen pe click karein"));
                    lastOrderCount = orders.length;
                } else if (orders.length < lastOrderCount) {
                    lastOrderCount = orders.length; // Order complete hone pe count update
                }

                if (orders.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center col-span-full mt-10 text-xl font-bold">No pending orders. Kitchen is clear! 🧹</p>';
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="bg-gray-900 border-2 border-yellow-600 rounded-xl p-5 shadow-2xl transform transition hover:scale-105">
                        <div class="flex justify-between border-b border-gray-700 pb-2 mb-3">
                            <span class="text-2xl font-bold text-white">TABLE: ${order.table}</span>
                            <span class="text-gray-400 font-bold">${order.time}</span>
                        </div>
                        <p class="text-xl text-yellow-100 mb-5 font-bold tracking-wide">${order.items}</p>
                        <button onclick="completeOrder(${order.rowId}, this)" class="w-full bg-green-600 py-3 rounded-lg font-black text-lg hover:bg-green-700 transition shadow-lg">MARK READY ✅</button>
                    </div>
                `).join('');
            } catch (e) { console.error("Error loading orders:", e); }
        }

        function completeOrder(rowNumber, btnElement) {
            btnElement.innerText = "UPDATING...";
            btnElement.disabled = true;
            btnElement.classList.add("opacity-50");

            // NAYA: Order complete karte time bhi resId bhejna hai
            fetch(SCRIPT_URL + "?action=markReady&res=" + resId + "&row=" + rowNumber)
                .then(response => response.text())
                .then(data => {
                    refreshOrders(); // Screen ko turant refresh karo
                })
                .catch(error => {
                    alert("Network Error! Please try again.");
                    btnElement.innerText = "MARK READY ✅";
                    btnElement.disabled = false;
                    btnElement.classList.remove("opacity-50");
                });
        }
        
        setInterval(refreshOrders, 5000); // Har 5 second mein naye order layega
        refreshOrders(); 
    </script>
</body>
</html>
